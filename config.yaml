app:
  name: "golib-api"
  version: "1.0.0"
  host: "0.0.0.0"
  port: 8080
  debug: true

database:
  driver: "oracle"
  host: "localhost"
  port: 1521
  service_name: "XE"
  username: "system"
  password: "oracle"
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime: 3600

redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0
  pool_size: 10

jwt:
  secret: "your-secret-key-change-in-production"
  expiry_hours: 24
  refresh_expiry_hours: 168

celery:
  broker_url: "redis://localhost:6379/0"
  result_backend: "redis://localhost:6379/1"
  task_serializer: "json"
  result_serializer: "json"
  accept_content: ["json"]
  timezone: "UTC"
  enable_utc: true

rate_limit:
  enabled: true
  requests_per_minute: 60
  burst: 10
EOF; __hermes_rc=$?; printf '__HERMES_FENCE_a9f7b3__'; exit $__hermes_rc
